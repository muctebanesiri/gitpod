name: Download from Commit & Save to Repo
on:
  push:
    branches:
      - "**"
jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 python3 python3-pip python3-requests ffmpeg curl pigz zstd
          pip3 install "yt-dlp[default]"

      - name: Install bun
        run: |
          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
          echo "BUN_INSTALL_DIR=$HOME/.bun" >> $GITHUB_ENV

      - name: Setup YouTube cookies
        if: success()
        run: |
          echo '${{ secrets.YOUTUBE_COOKIES }}' > youtube_cookies.txt
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Setup scripts
        run: |
          mkdir -p scripts
          cp -r ${{ github.server_url }}/${{ github.repository }}/scripts scripts/ || true

      - name: Extract URLs and download files
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qP 'download-zip:'; then
            MODE="zip"
            URL_LINE=$(echo "$MSG" | grep -oP 'download-zip:\s*\K.*')
          elif echo "$MSG" | grep -qP 'download:'; then
            MODE="normal"
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
          else
            echo "❌ No download command found in commit message"
            exit 1
          fi

          echo "Mode: $MODE"
          mkdir -p downloads tmp_downloads

          for URL in $URL_LINE; do
            echo "Processing: $URL"

            if echo "$URL" | grep -qE "(bunkr\.si|bunkr\.fi|bunkr\.ru|bunkr\.cr|bunkr\.rip|bunkrr\.su)"; then
              echo "Downloading Bunkr: $URL"
              python3 scripts/bunkr.py "$URL" "tmp_downloads"

            elif echo "$URL" | grep -qE "(youtube\.com|youtu\.be|twitch\.tv|reddit\.com|ni长沙|pexels|soundcloud)"; then
              echo "Downloading with yt-dlp: $URL"
              yt-dlp -q --no-warnings --js-runtimes bun:/home/runner/.bun/bin --cookies youtube_cookies.txt -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            else
              echo "Downloading with aria2: $URL"
              aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=90M \
                --summary-interval=2 \
                --dir="tmp_downloads" \
                "$URL"
            fi
          done

          if [ "$MODE" = "zip" ]; then
              ARCHIVE_NAME="tmp_downloads/archive_$(date +%Y%m%d_%H%M%S).tar.gz"
              tar -cvf - -C tmp_downloads . | pigz -k -p all > "$ARCHIVE_NAME"
            fi

          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "Splitting: $BASENAME ($(( SIZE / 1024 / 1024 ))MB)"
              split -b 90M "$FILE" "downloads/${BASENAME}.part_"
              echo "Parts: $(ls "downloads/${BASENAME}.part_"* 2>/dev/null | wc -l)"
            else
              cp "$FILE" "downloads/$BASENAME"
            fi
          done

          rm -rf tmp_downloads

      - name: Commit & Push in batches
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          cd downloads

          FILE_COUNT=$(find . -type f | wc -l)
          echo "Total files to push: $FILE_COUNT"

          BATCH_SIZE=10
          BATCH_NUM=0
          CURRENT_BATCH=1
          TOTAL_BATCHES=$(((FILE_COUNT + BATCH_SIZE - 1) / BATCH_SIZE))

          > /tmp/batch_files.txt

          find . -type f -print0 | sort -z | while IFS= read -r -d '' FILE; do
            BATCH_NUM=$((BATCH_NUM + 1))
            printf '%s\0' "$FILE" >> /tmp/batch_files.txt

            if [ $((BATCH_NUM % BATCH_SIZE)) -eq 0 ] || [ $BATCH_NUM -eq "$FILE_COUNT" ]; then
              xargs -0 git add -f < /tmp/batch_files.txt
              git commit -m "Add downloaded files (batch $CURRENT_BATCH/$TOTAL_BATCHES) [skip ci]" || echo "Nothing to commit"
              echo "🚀 Pushing batch $CURRENT_BATCH/$TOTAL_BATCHES..."
              git push origin HEAD:$BRANCH || true

              CURRENT_BATCH=$((CURRENT_BATCH + 1))
              > /tmp/batch_files.txt
            fi
          done
