name: Podcast Audio Enhancement Pipeline
# This workflow is triggered when new audio files are pushed to the "uploads" folder.
# It uses the official deep-filter binary to remove background noise and enhance clarity.

on:
  push:
    paths:
      - 'uploads/*.mp3'
      - 'uploads/*.m4a'
      - 'uploads/*.wav'
      - 'uploads/*.flac'
      - 'uploads/*.ogg'
      - 'uploads/*.aac'
    branches:
      - main
  # Allows you to manually run the workflow from the Actions tab.
  workflow_dispatch:

jobs:
  enhance-episode:
    runs-on: ubuntu-latest
    # Granting write permissions is necessary for the workflow to commit the enhanced files back to the repository.
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install System Dependencies (FFmpeg & SoX)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg sox

      - name: Download and Install DeepFilter Binary
        run: |
          # Get the latest deep-filter binary from the official releases
          curl -L https://github.com/Rikorose/DeepFilterNet/releases/download/v0.5.6/deep-filter-linux-x86_64 -o deep-filter
          chmod +x deep-filter
          # Move it to a directory that is in the system's PATH
          sudo mv deep-filter /usr/local/bin/

      - name: Process Audio Files
        id: process
        run: |
          # Create the directory where all enhanced audio files will be stored
          mkdir -p enhanced
          processed_files=""

          # Define all supported file extensions to loop through
          for ext in mp3 m4a wav flac ogg aac; do
            for file in uploads/*.$ext; do
              # If no files match the pattern, just skip to the next extension
              [ -e "$file" ] || continue

              BASENAME=$(basename "$file" .$ext)
              echo "=========================================="
              echo "Processing: $file"
              echo "Format: $ext | Basename: $BASENAME"
              echo "=========================================="

              # 1. Convert any input file to the required format (48kHz, 16-bit mono WAV)
              ffmpeg -i "$file" -acodec pcm_s16le -ar 16000 -ac 1 "temp_${BASENAME}.wav" -y

              # 2. Denoise using the official deep-filter binary
              # The binary automatically saves the output as '$basename_enhanced.wav'
              # We'll directly use the output naming convention it provides
              deep-filter "temp_${BASENAME}.wav"

              # 3. Normalize volume with SoX (gain to -3 dB)
              # The binary creates a file named '[input_filename]_DeepFilterNet2_enhanced.wav'.
              # We'll use that as the source for the next step.
              sox "temp_${BASENAME}_DeepFilterNet2_enhanced.wav" "normalized_${BASENAME}.wav" gain -n -3

              # 4. Convert the final, denoised and normalized audio to a high-quality MP3
              ffmpeg -i "normalized_${BASENAME}.wav" -codec:a libmp3lame -b:a 192k "enhanced/${BASENAME}_enhanced.mp3" -y

              processed_files="$processed_files ${BASENAME}"
              echo "✅ Successfully processed: ${BASENAME}"
              echo ""
            done
          done
          echo "processed=${processed_files}" >> $GITHUB_OUTPUT

      - name: Commit and Push Enhanced Audio
        if: steps.process.outputs.processed != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add enhanced/
          git diff --staged --quiet || git commit -m "Add enhanced audio files [skip ci]"
          git push

      - name: Cleanup Temporary Files
        if: always()
        run: rm -f temp_*.wav *_enhanced.wav normalized_*.wav
