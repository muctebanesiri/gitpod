name: Podcast Audio Enhancement Pipeline (Commit to Repo)

on:
  push:
    paths:
      - 'uploads/*.mp3'
      - 'uploads/*.m4a'
      - 'uploads/*.wav'
      - 'uploads/*.flac'
      - 'uploads/*.ogg'
      - 'uploads/*.aac'
    branches:
      - main
  workflow_dispatch:

jobs:
  enhance-episode:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg sox

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install DeepFilterNet
        run: |
          pip install deepfilternet

      - name: Process Audio Files
        id: process
        run: |
          mkdir -p enhanced
          processed_files=""
          for ext in mp3 m4a wav flac ogg aac; do
            for file in uploads/*.$ext; do
              [ -e "$file" ] || continue
              BASENAME=$(basename "$file" .$ext)
              echo "Processing: $file"
              ffmpeg -i "$file" -acodec pcm_s16le -ar 16000 -ac 1 "temp_${BASENAME}.wav" -y
              # Use python module directly (no PATH issues)
              python -m deepfilternet "temp_${BASENAME}.wav" "denoised_${BASENAME}.wav"
              sox "denoised_${BASENAME}.wav" "normalized_${BASENAME}.wav" gain -n -3
              ffmpeg -i "normalized_${BASENAME}.wav" -codec:a libmp3lame -b:a 192k "enhanced/${BASENAME}_enhanced.mp3" -y
              processed_files="$processed_files ${BASENAME}"
            done
          done
          echo "processed=${processed_files}" >> $GITHUB_OUTPUT

      - name: Commit and Push Enhanced Audio
        if: steps.process.outputs.processed != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add enhanced/
          git diff --staged --quiet || git commit -m "Add enhanced audio files [skip ci]"
          git push

      - name: Cleanup temporary files
        run: rm -f temp_*.wav denoised_*.wav normalized_*.wav
