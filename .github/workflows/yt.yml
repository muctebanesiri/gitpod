name: Podcast Audio Enhancer (Bulletproof)

on:
  push:
    paths:
      - 'uploads/*.mp3'
      - 'uploads/*.m4a'
    branches:
      - main
  workflow_dispatch:

jobs:
  enhance-podcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg sox

      - name: Process audio files
        id: process
        run: |
          mkdir -p enhanced
          processed_files=""
          for file in uploads/*.mp3 uploads/*.m4a; do
            [ -e "$file" ] || continue
            base=$(basename "$file" .${file##*.})
            echo "Processing: $file"

            # 1. Convert input to 48kHz WAV (arnndn needs 48kHz)
            ffmpeg -i "$file" -acodec pcm_s16le -ar 48000 -ac 1 "temp_${base}.wav" -y

            # 2. Apply cascading noise reduction filters
            #    afftdn: general broadband noise reduction
            #    anlmdn: non-local means denoiser for transient noise
            #    arnndn: RNNoise-based filter for hiss/hum reduction
            ffmpeg -i "temp_${base}.wav" -af "afftdn=nf=-25,anlmdn,silenceremove=1:0:-50dB,arnndn=m=./rnnoise-models/rnnoise-model.2023.1.1.nn,volume=2dB" "denoised_${base}.wav" -y

            # 3. Normalize loudness to broadcast standard (EBU R128)
            ffmpeg -i "denoised_${base}.wav" -af loudnorm=I=-16:LRA=11:TP=-1.5 "normalized_${base}.wav" -y

            # 4. Encode to high-quality MP3
            ffmpeg -i "normalized_${base}.wav" -codec:a libmp3lame -b:a 192k "enhanced/${base}_enhanced.mp3" -y

            processed_files="$processed_files $base"
          done
          echo "processed=${processed_files}" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.process.outputs.processed != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add enhanced/
          git diff --staged --quiet || git commit -m "Add enhanced podcast audio [skip ci]"
          git push

      - name: Cleanup
        if: always()
        run: rm -f temp_*.wav denoised_*.wav normalized_*.wav
