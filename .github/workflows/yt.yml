name: Podcast Audio Enhancement Pipeline

on:
  push:
    paths:
      - 'uploads/*.mp3'

jobs:
  enhance-episode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install FFmpeg and SoX
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg sox

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install DeepFilterNet
        run: |
          pip install deepfilternet
          echo "DeepFilterNet Noise Reduction Model Installed."

      - name: Process Audio
        run: |
          echo "Starting Audio Processing Workflow..."
          for file in uploads/*.mp3; do
            BASENAME=$(basename "$file" .mp3)
            echo "Processing: $file"

            # Step 1: Convert MP3 to WAV
            ffmpeg -i "$file" -acodec pcm_s16le -ar 16000 "temp_${BASENAME}.wav" -y

            # Step 2: Denoise using DeepFilterNet
            deep-filter "temp_${BASENAME}.wav" "denoised_${BASENAME}.wav"

            # Step 3: Normalize Audio Volume
            sox "denoised_${BASENAME}.wav" "normalized_${BASENAME}.wav" gain -n -3

            # Step 4: Convert final audio back to MP3
            ffmpeg -i "normalized_${BASENAME}.wav" -codec:a libmp3lame -b:a 192k "output/${BASENAME}_enhanced.mp3" -y

            echo "Finished Processing: $BASENAME"
          done

      - name: Upload Enhanced Audio
        uses: actions/upload-artifact@v4
        with:
          name: enhanced-episodes
          path: output/
